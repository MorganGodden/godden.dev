title: About Me
description: Learn more about Morgan Godden, a UK-based software engineer focused on front-end and full-stack solutions with Vue, NestJS, and Tailwind.
content: |
  Hi, I'm **Morgan Godden**, a Software Engineer based in the United Kingdom. I build thoughtful web applications with a strong front-end focus, using Vue, NestJS, and Tailwind to bring structured, reliable interfaces to life. 
  Over the last two years, I have focused on making robust user experiences that feel ordered and intentional. I enjoy turning complex feature requirements into clean code and clear flows, and I take pride in delivering solutions that are easy to maintain and intuitive to use.

  ### How I Work

  I believe that good software is built on strong foundations: consistent structure, well-defined components, and a clear separation between design and implementation. My technical approach leans on Vue for polished front ends, NestJS for scalable back-end services, and Tailwind for fast, maintainable styling.
  I value the stability that comes from good architecture, and I use that order to make teams move faster while keeping code easy to understand.

  ### What Keeps Me Going

  What drives me most is the satisfaction of taking something that feels messy and shaping it into a dependable, efficient product. I enjoy the discipline of planning features carefully, refining user interactions, and ensuring each part of a project fits together cleanly.

  ### Beyond the Browser

  Outside of software engineering, I’m passionate about game development and enjoy building personal projects in that space. Game design helps me stay creative and gives me a unique perspective on interactivity, polish, and user-focused system design.
  Thanks for stopping by. Feel free to explore my [projects](/projects) or [get in touch](mailto:morgan.godden@outlook.com) if you’d like to collaborate.
